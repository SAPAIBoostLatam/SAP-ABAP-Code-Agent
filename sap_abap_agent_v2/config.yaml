# Agent metadata
agent_name: 'sap_abap_agent_v2'
agent_display_name: 'SAP ABAP ADK Agent V2'
agent_description: 'SAP ABAP Code Agent in Google Cloud'

# Deployment settings
deploy:
  # List of Python dependencies required for the agent to run.
  dependencies: [
    'google-cloud-aiplatform[agent_engines,adk]==1.128.0',
    'google-adk==1.19.0', 
    'cloudpickle', 
    'pydantic', 
    'python-dotenv',
    'pyyaml',
    'google-cloud-discoveryengine',
    'requests',
    'urllib3'
    ]